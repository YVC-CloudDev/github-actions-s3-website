# ============================================================
# DEPLOY TO AWS S3 + CLOUDFRONT — GitHub Actions Workflow
# ============================================================
# Automatically uploads the static website to an S3 bucket
# whenever code is pushed to main or master.
#
# Uses OIDC (OpenID Connect) to authenticate with AWS —
# no static access keys needed.
#
# ---- PREREQUISITES ----
# 1. An S3 bucket configured for static website hosting.
# 2. An IAM Role with AmazonS3FullAccess and CloudFrontFullAccess,
#    trusting the GitHub OIDC provider.
# 3. Three GitHub repository secrets:
#      • AWS_ROLE_ARN       — the ARN of the IAM Role
#      • S3_BUCKET_NAME     — the name of the S3 bucket
#      • CLOUDFRONT_DIST_ID — the CloudFront distribution ID
# ============================================================

name: Deploy to S3 and CloudFront

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  deploy:
    name: Upload to S3 and Invalidate CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Sync files to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md" \
            --exclude "LICENSE"

       - name: Invalidate CloudFront Cache
        run: |
          echo "🔄 Invalidating CloudFront distribution: $CLOUDFRONT_DISTRIBUTION_ID"
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"
          echo "✅ CloudFront cache invalidation started!"
          # Note: Invalidation typically completes within 1-2 minutes across all edge locations
          # "/*" invalidates everything — for large sites, you can target specific changed files
          # AWS gives you 1,000 free invalidation paths per month (/* counts as 
